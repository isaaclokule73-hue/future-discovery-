<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Discovery</title>

<style>
body {
margin:0;
font-family:Arial;
background:#f5f5f5;
transition:0.3s;
scroll-behavior:smooth;
}

/* DARK MODE */
.dark {background:#111;color:white;}

/* NAV */
nav {
background:#0a7d2c;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* HERO */
.hero {
background:url('IMG_2905.jpeg') center/cover no-repeat;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-shadow:2px 2px 15px black;
}

/* BUTTON */
.btn {
background:#0a7d2c;
padding:12px 25px;
color:white;
border-radius:25px;
text-decoration:none;
margin:10px;
}

/* SECTION */
.section {padding:50px;text-align:center;}

/* TEAM */
.team {display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.team img {width:140px;height:140px;border-radius:50%;}

/* CARDS */
.cards {display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.card {background:white;padding:20px;border-radius:10px;width:180px;}

/* GALLERY */
.gallery {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.gallery img {width:100%;border-radius:10px;}

/* FLOAT */
.float {position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;}
.float a {background:#25D366;color:white;padding:15px;border-radius:50%;text-decoration:none;}

/* LOGIN */
.login {
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
display:none;
}

/* DARK FIX */
.dark .card {background:#222;color:white;}

</style>
</head>

<body id="body">

<nav>
<b>Future Discovery</b>
<div>
<button onclick="toggleMode()">🌙</button>
<button onclick="showLogin()">🔐</button>
</div>
</nav>

<div class="hero">
<h1>Future Discovery</h1>
<p>Fuel • Forex • Supermarket • Restaurant</p>
<a class="btn" href="tel:0777495808">Call</a>
<a class="btn" href="https://wa.me/211777495808">WhatsApp</a>
</div>

<div class="section">
<h2>Leadership</h2>
<div class="team">
<img src="IMG_1983.jpeg">
<img src="IMG_0023.jpeg">
<img src="IMG_8515.jpeg">
</div>
</div>

<div class="section">
<h2>Services</h2>
<div class="cards">
<div class="card">Fuel</div>
<div class="card">Forex</div>
<div class="card">Supermarket</div>
<div class="card">Restaurant</div>
</div>
</div>

<div class="section">
<h2>Fuel Price</h2>
<p id="priceDisplay">Loading...</p>
<input id="newPrice" placeholder="Enter new price">
<button onclick="savePrice()">Update</button>
</div>

<div class="section">
<h2>Gallery</h2>
<div class="gallery">
<img src="IMG_8701.jpeg">
<img src="IMG_8981.jpeg">
<img src="IMG_9084.jpeg">
<img src="IMG_2905.jpeg">
</div>
</div>

<div class="section">
<h2>Forex Converter</h2>
<input id="amount" type="number">
<select id="rate">
<option value="0.00027">UGX→USD</option>
<option value="3700">USD→UGX</option>
</select>
<button onclick="convert()">Convert</button>
<p id="result"></p>
</div>

<div class="section">
<h2>Contact</h2>
<p>Nyakorun, South Sudan</p>
<p>0777 495 808</p>
</div>

<div class="float">
<a href="https://wa.me/211777495808">💬</a>
<a href="tel:0777495808">📞</a>
</div>

<!-- LOGIN BOX -->
<div class="login" id="loginBox">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>

// DARK MODE
function toggleMode(){
document.getElementById("body").classList.toggle("dark");
}

// FOREX
function convert(){
let a=document.getElementById("amount").value;
let r=document.getElementById("rate").value;
document.getElementById("result").innerText=a*r;
}

// SAVE PRICE
function savePrice(){
let p=document.getElementById("newPrice").value;
localStorage.setItem("fuelPrice",p);
loadPrice();
}

// LOAD PRICE
function loadPrice(){
let p=localStorage.getItem("fuelPrice");
document.getElementById("priceDisplay").innerText="Fuel Price: "+p;
}
loadPrice();

// LOGIN
function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
let p=document.getElementById("pass").value;
if(p==="1234"){
alert("Welcome Admin");
document.getElementById("loginBox").style.display="none";
}else{
alert("Wrong Password");
}
}

</script>

</body>
</html>
